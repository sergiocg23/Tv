# Override específico para PC con NVIDIA
# Usar con: docker compose -f docker-compose.yml -f docker-compose-nvidia-ext.yml up -d

services:
  jellyfin:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]