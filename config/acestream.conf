# ============================================
# ACESTREAM ENGINE CONFIGURATION
# ============================================

# -------------------------------------------
# MODO DE EJECUCION
# -------------------------------------------
--client-console
# --client-wx

# -------------------------------------------
# CONFIGURACION DE CACHE
# -------------------------------------------
# Tipo de cache para streams en vivo y VOD
--live-cache-type memory
--vod-cache-type memory
--cache-dir /opt/acestream/cache

# Limites de cache en memoria para live (en bytes)
# Por defecto: 256 MB para streams en vivo
--live-mem-cache-size 268435456

# Limites de cache en disco para live (en bytes)
# Por defecto: 2 GB para streams en vivo
--live-disk-cache-size 2147483648

# Limites generales de cache (en bytes)
# Maximo de cache en RAM: 512 MB
--memory-cache-limit 536870912

# Maximo de cache en disco: 5 GB
--disk-cache-limit 5368709120

# -------------------------------------------
# LIMITES DE RED Y CONEXIONES
# -------------------------------------------
# Conexiones totales maximas
--max-connections 500

# Maximo de conexiones a peers
--max-peers 50

# Limite maximo de conexiones a peers
--max-peers-limit 100

# Conexiones reservadas para peers de timeshift
--max-timeshift-peers 10

# Maximo de slots de upload
--max-upload-slots 50

# Limites de velocidad (0 = sin limite, en Kb/s)
--download-limit 0
--upload-limit 0

# -------------------------------------------
# CONFIGURACION DE LOGGING
# -------------------------------------------
# Archivo de log principal
--log-file /opt/acestream/acestream.log

# Modo de escritura: a=append (anadir), w=overwrite (sobrescribir)
--log-file-mode a

# Tamano maximo del archivo de log (100 MB)
--log-max-size 104857600

# Numero de archivos de backup de logs
--log-backup-count 5

# Buffer de memoria para logs (64 KB)
--log-file-buffer 65536

# Codificacion del archivo de log (comentado: causa error con caracteres especiales)
# --log-file-encoding utf-8

# Log a stdout (comentar para que escriba SOLO en archivo)
# --log-stdout
# --log-stdout-level info

# Log a stderr (NO compatible con --log-stdout)
# --log-stderr
# --log-stderr-level error

# -------------------------------------------
# OTRAS OPCIONES
# -------------------------------------------
# Deshabilitar reporte de errores a Sentry
--disable-sentry

# Usar ffmpeg (1=si, 0=no)
--use-ffmpeg 1

# User agent personalizado (opcional)
# --user-agent "AceStream/3.1"

# Profiler interno (0=deshabilitado, 1=habilitado)
--enable-profiler 0

# Logging verbose para modulos especificos (separados por comas)
# --verbose module1,module2 