# Override específico para PC con NVIDIA
# Usar con: docker compose --env-file .env -f compose/docker-compose.tv.yml -f compose/docker-compose.tv.nvidia-ext.yml up -d

services:
  jellyfin:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]